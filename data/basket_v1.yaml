# ─────────────────────────────────────────────
# Vintage Condition Tags（自動付与）
# ─────────────────────────────────────────────

condition_tags:
  - tag: all_original
    description: 全オリジナル
    price_impact: "100% baseline"
  - tag: partial_changed
    description: 一部交換
    price_impact: "-10 to -20%"
  - tag: refin
    description: リフィニッシュ
    price_impact: "-20 to -40%"
  - tag: replaced_neck
    description: ネック交換
    price_impact: "-50% or more"
  - tag: parts_caster
    description: パーツ寄せ集め
    price_impact: "個別査定"
  - tag: case_present
    description: 純正ケース付属
    price_impact: "+5%"
  - tag: paperwork_present
    description: ハングタグ・書類完備
    price_impact: "+10%"


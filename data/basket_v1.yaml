# GUITAR ATLAS — Phase 1 Basket v1.0
# 確定日: 2026-05-09
# 総モデル数: 58 (MFI 18 + VFI 18 + BPI 22)
# 用途: 自動化スクリプトが直接読込み、Reverb API クエリ生成等に使用

version: "1.0"
locked_at: "2026-05-09"
index_base_date: "2026-06-01"

indexes:
  GAI-E:
    name: "Guitar Atlas Index - Electric"
    weights: { MFI: 0.40, VFI: 0.30, BPI: 0.30 }

  MFI:
    name: "Mainstream Flagship Index"
    description: "現行新品の動向"
    model_count: 18

  VFI:
    name: "Vintage Flagship Index"
    description: "ヴィンテージ市場の動向"
    model_count: 18
    series:
      - "all_original_only"
      - "all_conditions"

  BPI:
    name: "Boutique Premium Index"
    description: "ブティックの動向"
    model_count: 22

spreads:
  boutique_premium:
    formula: "BPI / MFI"
    description: "ブティックがフラッグシップに対して何倍プレミアムか"

  vintage_premium:
    formula: "VFI / MFI"
    description: "ヴィンテージが現行新品に対して何倍プレミアムか"

  heritage_spread:
    formula: "VFI / BPI"
    description: "ヴィンテージがブティックに対して何倍評価されているか"

